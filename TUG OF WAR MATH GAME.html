<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartoon Math Tug-O-War</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Bangers', cursive; 
            background: #87CEEB; 
        }
        
        /* 2D Cartoon Background */
        canvas { 
            display: block; 
            background: linear-gradient(#87CEEB 0%, #87CEEB 70%, #2ecc71 70%, #27ae60 100%); 
        }

        #game-interface { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; 
            pointer-events: none; 
        }

        .stats { 
            display: flex; justify-content: space-between; width: 90%; 
            margin-top: 20px; color: #2c3e50; font-size: 28px; 
            text-shadow: 2px 2px 0 rgba(255,255,255,0.5);
        }

        .panel { 
            margin-top: auto; margin-bottom: 40px; 
            background: rgba(255,255,255,0.95); padding: 25px; 
            border-radius: 25px; border: 6px solid #f1c40f; 
            text-align: center; pointer-events: auto; width: 320px; 
            box-shadow: 0 10px 0 rgba(0,0,0,0.2); 
        }

        #question { font-size: 64px; color: #e67e22; margin: 5px 0; }
        #powerup-msg { 
            color: #27ae60; height: 30px; font-size: 18px; 
            font-family: 'Orbitron', sans-serif; 
        }

        input { 
            width: 150px; font-size: 45px; background: #fff; 
            color: #333; border: 4px solid #bdc3c7; border-radius: 12px; 
            text-align: center; outline: none; font-family: 'Bangers'; 
        }

        .overlay-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(44, 62, 80, 0.9); z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; color: white; text-align: center; 
        }

        h1 { font-size: 90px; color: #f1c40f; margin: 0; text-shadow: 5px 5px 0 #c0392b; }
        button { 
            background: #e67e22; color: white; padding: 20px 60px; 
            font-size: 35px; border-radius: 20px; cursor: pointer; 
            border: none; font-family: 'Bangers'; 
            box-shadow: 0 8px 0 #d35400; transition: 0.1s; 
        }
        button:hover { background: #ff9f43; }
        button:active { transform: translateY(4px); box-shadow: 0 4px 0 #d35400; }
    </style>
</head>
<body>

<div id="start-screen" class="overlay-screen">
    <h1>CARTOON TUG!</h1>
    <p style="font-size: 24px; margin-bottom: 30px;">Type the answer and hit ENTER to pull!</p>
    <button onclick="startGame()">BATTLE!</button>
</div>

<div id="game-interface">
    <div class="stats">
        <div>SCORE: <span id="score-text">0</span></div>
        <div>STRENGTH: <span id="strength-text">50%</span></div>
    </div>
    <div class="panel">
        <div id="powerup-msg"></div>
        <div id="question">--</div>
        <input type="number" id="ans-input" placeholder="?">
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let ropePos = 0; // 0 = perfectly centered
    let active = false;
    let score = 0;
    let aiPullPower = 0.35; // How fast the computer pulls
    let streak = 0;
    let isPowerUp = false;
    let targetResult = 0;
    const WIN_THRESHOLD = 200; // Pixels from center to end game

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.onresize = resize;
    resize();

    function drawCharacter(x, y, color, isFlipped) {
        ctx.save();
        ctx.translate(x, y);
        if (isFlipped) ctx.scale(-1, 1);

        // Legs/Feet
        ctx.fillStyle = "#333";
        ctx.fillRect(-15, -15, 10, 15);
        ctx.fillRect(5, -15, 10, 15);

        // Body (Shirt)
        ctx.fillStyle = color;
        ctx.fillRect(-22, -60, 44, 45);

        // Head
        ctx.fillStyle = "#ffdbac";
        ctx.beginPath();
        ctx.arc(0, -75, 22, 0, Math.PI * 2);
        ctx.fill();

        // Eyes
        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.arc(-8, -78, 6, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(8, -78, 6, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "black";
        ctx.beginPath(); ctx.arc(-6, -78, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(10, -78, 2.5, 0, Math.PI * 2); ctx.fill();

        // Hands (Gripping rope)
        ctx.fillStyle = "#ffdbac";
        ctx.beginPath(); ctx.arc(20, -40, 9, 0, Math.PI * 2); ctx.fill();

        ctx.restore();
    }

    function spawnQuestion() {
        const ops = ['+', '-', '*'];
        const op = ops[Math.floor(Math.random() * (score > 10 ? 3 : 2))];
        let n1 = Math.floor(Math.random() * 12) + 1;
        let n2 = Math.floor(Math.random() * 12) + 1;
        
        if(op === '-') { 
            let total = n1 + n2; 
            targetResult = n1; 
            document.getElementById('question').innerText = `${total} - ${n2}`;
        } else if(op === '*') { 
            targetResult = n1 * n2; 
            document.getElementById('question').innerText = `${n1} x ${n2}`;
        } else { 
            targetResult = n1 + n2; 
            document.getElementById('question').innerText = `${n1} + ${n2}`;
        }
    }

    function checkAnswer() {
        const val = parseInt(document.getElementById('ans-input').value);
        if(val === targetResult) {
            streak++;
            score += isPowerUp ? 2 : 1;
            
            // Player pulls LEFT (negative)
            let pullStrength = isPowerUp ? 60 : 40;
            ropePos -= pullStrength; 
            
            aiPullPower += 0.02; // Game gets slightly harder
            
            if(streak >= 3) {
                isPowerUp = true;
                document.getElementById('powerup-msg').innerText = "COMBO: DOUBLE PULL!";
            }
            
            document.getElementById('score-text').innerText = score;
            document.getElementById('ans-input').value = "";
            spawnQuestion();
        } else {
            streak = 0;
            isPowerUp = false;
            document.getElementById('powerup-msg').innerText = "";
        }
    }

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        active = true;
        spawnQuestion();
        document.getElementById('ans-input').focus();
    }

    document.getElementById('ans-input').addEventListener('keydown', (e) => { 
        if(e.key === 'Enter') checkAnswer(); 
    });

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const centerX = canvas.width / 2 + ropePos;
        const groundY = canvas.height * 0.7;

        // 1. Draw Rope
        ctx.strokeStyle = "#7e5835";
        ctx.lineWidth = 14;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(0, groundY - 40);
        ctx.lineTo(canvas.width, groundY - 40);
        ctx.stroke();

        // 2. Draw Center Marker (Yellow Ribbon)
        ctx.fillStyle = "#f1c40f";
        ctx.fillRect(centerX - 6, groundY - 70, 12, 60);

        // 3. Draw Blue Team (Left)
        for(let i=0; i<3; i++) {
            drawCharacter(centerX - 100 - (i * 70), groundY, "#3498db", false);
        }

        // 4. Draw Red Team (Right)
        for(let i=0; i<3; i++) {
            drawCharacter(centerX + 100 + (i * 70), groundY, "#e74c3c", true);
        }

        if(active) {
            // AI slowly pulls to the RIGHT
            ropePos += aiPullPower; 
            
            // Calculate Strength % (0% = Red wins, 100% = Blue wins)
            // Normalized to the WIN_THRESHOLD
            let strengthVal = Math.floor(50 - (ropePos / WIN_THRESHOLD * 50));
            document.getElementById('strength-text').innerText = Math.max(0, Math.min(100, strengthVal)) + "%";

            // Win Condition Logic
            if (ropePos <= -WIN_THRESHOLD) {
                endGame("VICTORY! Blue Team Pulled Red Past the Center!");
            } else if (ropePos >= WIN_THRESHOLD) {
                endGame("DEFEAT! Red Team Pulled Blue Past the Center!");
            }
        }

        requestAnimationFrame(update);
    }

    function endGame(msg) {
        active = false;
        setTimeout(() => {
            alert(msg);
            location.reload();
        }, 100);
    }

    update();
</script>
</body>
</html>
