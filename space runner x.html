<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER SPACE: NEON RUNNER</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #050505; font-family: 'Segoe UI', Orbitron, sans-serif; }
        canvas { display: block; }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00f5ff;
            text-shadow: 0 0 10px #00f5ff;
            z-index: 10;
        }

        #score { font-size: 2.5rem; font-weight: 900; font-style: italic; }
        #multiplier { font-size: 1.2rem; color: #ff00ff; display: none; }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border: 2px solid #00f5ff;
            box-shadow: 0 0 30px #00f5ff;
            color: white;
            text-align: center;
            display: none;
            z-index: 20;
        }

        #gameOver h1 { font-size: 4rem; margin-bottom: 10px; color: #ff00ff; text-shadow: 0 0 20px #ff00ff; }
        
        button {
            margin-top: 20px;
            padding: 15px 40px;
            border: none;
            background: #00f5ff;
            color: black;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #ff00ff; color: white; transform: scale(1.1); }
    </style>
    <p>Circle Shapes Are Powerups</p>
</head>
<body>

<div id="ui">
    <div id="score">0000</div>
    <div id="multiplier">WARP SPEED ACTIVE! x5</div>
</div>

<div id="gameOver">
    <h1>CRITICAL FAILURE</h1>
    <p id="finalScore"></p>
    <button onclick="restartGame()">Reboot System</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// GAME STATE
let score = 0;
let gameRunning = true;
let gameSpeed = 1;
let warpTimer = 0;
const keys = {};

// PLAYER OBJECT
const player = {
    x: canvas.width / 2,
    y: canvas.height - 150,
    w: 50,
    h: 70,
    targetX: canvas.width / 2,
    speed: 12,
    color: "#00f5ff"
};

// BACKGROUND ELEMENTS
const stars = Array.from({length: 150}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    v: Math.random() * 5 + 2
}));

const obstacles = [];
const crystals = [];

// INPUTS
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

function spawnObstacle() {
    if (!gameRunning) return;
    const size = 50 + Math.random() * 60;
    obstacles.push({
        x: Math.random() * (canvas.width - size),
        y: -100,
        w: size,
        h: size,
        speed: (5 + Math.random() * 5) * gameSpeed,
        hue: Math.random() * 60 + 280 // Purple/Pink palette
    });
}

function spawnCrystal() {
    if (!gameRunning) return;
    crystals.push({
        x: Math.random() * (canvas.width - 30),
        y: -50,
        size: 20,
        speed: 7 * gameSpeed
    });
}

// TIMERS
let obsInterval = setInterval(spawnObstacle, 800);
let cryInterval = setInterval(spawnCrystal, 4000);

function drawGrid() {
    ctx.strokeStyle = "rgba(0, 245, 255, 0.15)";
    ctx.lineWidth = 1;
    for(let i = 0; i < canvas.width; i += 50) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, canvas.height);
        ctx.stroke();
    }
    const offset = (Date.now() / 10) % 50;
    for(let i = 0; i < canvas.height; i += 50) {
        ctx.beginPath();
        ctx.moveTo(0, i + offset);
        ctx.lineTo(canvas.width, i + offset);
        ctx.stroke();
    }
}

function update() {
    if (!gameRunning) return;

    // Gradual speed increase
    gameSpeed += 0.0002;
    
    // Movement
    if (keys["ArrowLeft"] || keys["a"]) player.x -= player.speed;
    if (keys["ArrowRight"] || keys["d"]) player.x += player.speed;
    
    // Constraints
    player.x = Math.max(player.w, Math.min(canvas.width - player.w, player.x));

    // Powerup Logic
    if (warpTimer > 0) {
        warpTimer--;
        score += 5;
        document.getElementById("multiplier").style.display = "block";
    } else {
        score++;
        document.getElementById("multiplier").style.display = "none";
    }

    document.getElementById("score").innerText = score.toString().padStart(6, '0');
}

function draw() {
    // Cyber Background
    ctx.fillStyle = "#050505";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawGrid();

    // Stars
    ctx.fillStyle = "white";
    stars.forEach(s => {
        ctx.fillRect(s.x, s.y, s.size, s.size);
        s.y += s.v * (warpTimer > 0 ? 4 : 1);
        if (s.y > canvas.height) s.y = 0;
    });

    // Player Neon Glow
    ctx.shadowBlur = 15;
    ctx.shadowColor = player.color;
    ctx.fillStyle = player.color;
    
    // Spaceship shape
    ctx.beginPath();
    ctx.moveTo(player.x, player.y);
    ctx.lineTo(player.x - player.w/2, player.y + player.h);
    ctx.lineTo(player.x + player.w/2, player.y + player.h);
    ctx.fill();

    // Engine thruster
    ctx.shadowColor = "red";
    ctx.fillStyle = warpTimer > 0 ? "#ff00ff" : "#ffaa00";
    ctx.fillRect(player.x - 5, player.y + player.h, 10, 10 + Math.random() * 20);

    // Obstacles
    ctx.shadowBlur = 10;
    obstacles.forEach((o, i) => {
        o.y += o.speed * (warpTimer > 0 ? 0.5 : 1); // Slow obstacles in warp for "bullet time" feel
        ctx.shadowColor = `hsl(${o.hue}, 100%, 50%)`;
        ctx.fillStyle = `hsl(${o.hue}, 100%, 50%)`;
        ctx.fillRect(o.x, o.y, o.w, o.h);

        // Collision
        if (player.x + player.w/2 > o.x && player.x - player.w/2 < o.x + o.w &&
            player.y + player.h > o.y && player.y < o.y + o.h) {
            if (warpTimer === 0) endGame();
        }

        if (o.y > canvas.height) obstacles.splice(i, 1);
    });

    // Crystals
    ctx.shadowColor = "#ff00ff";
    ctx.fillStyle = "#ff00ff";
    crystals.forEach((c, i) => {
        c.y += c.speed;
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.size, 0, Math.PI * 2);
        ctx.fill();

        // Collection
        let dist = Math.hypot(player.x - c.x, player.y - c.y);
        if (dist < 50) {
            crystals.splice(i, 1);
            warpTimer = 200; // Trigger Warp
        }
    });

    ctx.shadowBlur = 0; // Reset blur for other elements
    
    requestAnimationFrame(() => {
        update();
        draw();
    });
}

function endGame() {
    gameRunning = false;
    document.getElementById("gameOver").style.display = "block";
    document.getElementById("finalScore").innerText = "DATA RECOVERY: " + score;
}

function restartGame() {
    location.reload();
}

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

draw();
</script>
</body>
</html>
