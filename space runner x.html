<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CYBER SPACE: NEON RUNNER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');

* {
margin: 0;
padding: 0;
box-sizing: border-box;
user-select: none;
touch-action: none;
}

body {
overflow: hidden;
background: #03030c;
font-family: 'Rajdhani', sans-serif;
height: 100vh;
width: 100vw;
}

canvas {
display: block;
position: absolute;
top: 0;
left: 0;
z-index: 1;
}
body::after {
content: " ";
display: block;
position: fixed;
top: 0; left: 0; bottom: 0; right: 0;
background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
z-index: 999;
background-size: 100% 4px;
pointer-events: none;
}

#ui {
position: absolute;
top: 20px;
left: 20px;
color: #00f5ff;
z-index: 10;
font-family: 'Orbitron', sans-serif;
pointer-events: none;
}

#score-label {
font-size: 0.7rem;
letter-spacing: 3px;
color: rgba(0, 245, 255, 0.6);
}

#score {
font-size: 2.2rem;
font-weight: 900;
text-shadow: 0 0 15px rgba(0, 245, 255, 0.7);
}

#multiplier {
font-size: 0.9rem;
font-weight: bold;
color: #ff00ff;
text-shadow: 0 0 10px #ff00ff;
margin-top: 5px;
opacity: 0;
transform: translateY(-10px);
transition: all 0.3s ease;
background: rgba(255, 0, 255, 0.1);
padding: 4px 10px;
border-left: 3px solid #ff00ff;
display: inline-block;
}

#multiplier.active {
opacity: 1;
transform: translateY(0);
}

/* Interactive Pause Toggle Button */
#pauseBtn {
position: absolute;
top: 20px;
right: 20px;
z-index: 100;
width: 50px;
height: 50px;
border: 1px solid #00f5ff;
background: rgba(0, 245, 255, 0.1);
color: #00f5ff;
font-family: 'Orbitron', sans-serif;
font-weight: bold;
font-size: 1.2rem;
cursor: pointer;
border-radius: 4px;
display: flex;
align-items: center;
justify-content: center;
box-shadow: 0 0 10px rgba(0, 245, 255, 0.2);
transition: all 0.2s ease;
}

#pauseBtn:active {
transform: scale(0.9);
background: #00f5ff;
color: #03030c;
}

#hint {
position: absolute;
bottom: 20px;
left: 50%;
transform: translateX(-50%);
color: rgba(255, 255, 255, 0.4);
font-size: 0.8rem;
letter-spacing: 1px;
z-index: 5;
text-align: center;
width: 90%;
text-transform: uppercase;
}

/* Screen overlays for system menus */
.modal {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%) scale(0.9);
background: rgba(5, 5, 15, 0.9);
backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);
padding: 40px 30px;
width: 85%;
max-width: 400px;
border: 2px solid #00f5ff;
box-shadow: 0 0 40px rgba(0, 245, 255, 0.3);
color: white;
text-align: center;
opacity: 0;
visibility: hidden;
transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
z-index: 20;
border-radius: 8px;
}

.modal.visible {
opacity: 1;
visibility: visible;
transform: translate(-50%, -50%) scale(1);
}

.modal h1 {
font-family: 'Orbitron', sans-serif;
font-size: 2.5rem;
font-weight: 900;
margin-bottom: 10px;
color: #ff00ff;
text-shadow: 0 0 25px #ff00ff;
}
.modal-details {
font-size: 1.2rem;
color: #00f5ff;
margin-bottom: 25px;
}

.menu-btn {
padding: 14px 40px;
border: 1px solid #00f5ff;
background: transparent;
color: #00f5ff;
font-family: 'Orbitron', sans-serif;
font-size: 1rem;
font-weight: bold;
text-transform: uppercase;
cursor: pointer;
transition: all 0.2s ease;
box-shadow: 0 0 15px rgba(0, 245, 255, 0.2);
width: 100%;
margin-bottom: 10px;
}

.menu-btn:hover, .menu-btn:active {
background: #00f5ff;
color: #050505;
}

.menu-btn.secondary {
border-color: #ff00ff;
color: #ff00ff;
box-shadow: 0 0 15px rgba(255, 0, 255, 0.1);
}
.menu-btn.secondary:hover, .menu-btn.secondary:active {
background: #ff00ff;
color: #050505;
}
</style>
</head>
<body>

<div id="ui">
<div id="score-label">SCORE</div>
<div id="score">000000</div>
<div id="multiplier">WARP OVERDRIVE [x5]</div>
</div>

<button id="pauseBtn" onclick="togglePause()">II</button>

<div id="hint">Drag/Tap to move • Press ESC to pause</div>

<div id="pauseMenu" class="modal">
<h1>SYSTEM PAUSED</h1>
<div class="modal-details">ENGINE DRIVES STANDBY</div>
<button class="menu-btn" onclick="togglePause()">Resume Flight</button>
<button class="menu-btn secondary" onclick="restartGame()">Restart Game</button>
</div>

<div id="gameOver" class="modal">
<h1>TRY AGAIN</h1>
<div id="finalScore" class="modal-details"></div>
<button class="menu-btn" onclick="restartGame()">Reboot System</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
resizeCanvas();

// GAME STATE
let score = 0;
let gameRunning = true;
let isPaused = false;
let gameSpeed = 1;
let warpTimer = 0;
const keys = {};

// PLAYER OBJECT
const player = {
x: canvas.width / 2,
y: canvas.height - 150,
w: 40,
h: 75,
targetX: canvas.width / 2,
speed: 14
};

// BACKGROUND & OBJECT ENSEMBLES
const stars = Array.from({length: 80}, () => ({
x: Math.random() * window.innerWidth,
y: Math.random() * window.innerHeight,
size: Math.random() * 2 + 0.5,
v: Math.random() * 4 + 2
}));

let obstacles = [];
let crystals = [];
let obsInterval, cryInterval;

function startSpawning() {
obsInterval = setInterval(spawnObstacle, 900);
cryInterval = setInterval(spawnCrystal, 4000);
}

function stopSpawning() {
clearInterval(obsInterval);
clearInterval(cryInterval);
}

// HARDWARE INPUT CONTROLS (PC Keyboards)
window.addEventListener("keydown", e => {
keys[e.key] = true;
if(["ArrowLeft", "ArrowRight", " ", "a", "d", "A", "D"].includes(e.key)) e.preventDefault();
// Toggle pause with Escape or P key
if((e.key === "Escape" || e.key === "p" || e.key === "P") && gameRunning) {
togglePause();
}
});
window.addEventListener("keyup", e => keys[e.key] = false);

// MOBILE TOUCH CONTROLS
function handleTouch(e) {
if (!gameRunning || isPaused || !e.touches.length) return;
player.targetX = e.touches[0].clientX;
}
window.addEventListener("touchstart", handleTouch, { passive: true });
window.addEventListener("touchmove", handleTouch, { passive: true });

function spawnObstacle() {
if (!gameRunning || isPaused) return;
const size = 40 + Math.random() * 45;
obstacles.push({
x: Math.random() * (canvas.width - size),
y: -100,
w: size,
h: size,
speed: (4 + Math.random() * 4) * gameSpeed,
hue: Math.random() * 50 + 290
});
}

function spawnCrystal() {
if (!gameRunning || isPaused) return;
crystals.push({
x: 30 + Math.random() * (canvas.width - 60),
y: -50,
size: 12,
speed: 5.5 * gameSpeed
});
}

function togglePause() {
if (!gameRunning) return;
isPaused = !isPaused;
const pauseMenu = document.getElementById("pauseMenu");
const pauseBtn = document.getElementById("pauseBtn");
if (isPaused) {
stopSpawning();
pauseMenu.classList.add("visible");
pauseBtn.innerText = "▶";
} else {
startSpawning();
pauseMenu.classList.remove("visible");
pauseBtn.innerText = "II";
}
}

function drawGrid() {
ctx.strokeStyle = "rgba(0, 245, 255, 0.05)";
ctx.lineWidth = 1;
for(let i = 0; i < canvas.width; i += 50) {
ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
}
const offset = (Date.now() / 8) % 50;
for(let i = -50; i < canvas.height; i += 50) {
ctx.beginPath(); ctx.moveTo(0, i + offset); ctx.lineTo(canvas.width, i + offset); ctx.stroke();
}
}

function update() {
if (!gameRunning || isPaused) return;

gameSpeed += 0.0002;
// Keyboard Input Processing
if (keys["ArrowLeft"] || keys["a"] || keys["A"]) {
player.x -= player.speed;
player.targetX = player.x;
} else if (keys["ArrowRight"] || keys["d"] || keys["D"]) {
player.x += player.speed;
player.targetX = player.x;
} else {
let dx = player.targetX - player.x;
player.x += dx * 0.35;
}
player.x = Math.max(player.w, Math.min(canvas.width - player.w, player.x));

// Overdrive calculations
const multElement = document.getElementById("multiplier");
if (warpTimer > 0) {
warpTimer--;
score += 5;
multElement.classList.add("active");
} else {
score++;
multElement.classList.remove("active");
}

document.getElementById("score").innerText = score.toString().padStart(6, '0');
}

function drawRocket(x, y, w, h) {
ctx.save();
ctx.translate(x, y);

// 1. ENGINE FIRE BURST
if (!isPaused) {
let firePulse = warpTimer > 0 ? 2.5 : 1.2;
let fireGrad = ctx.createLinearGradient(0, h * 0.8, 0, h * (0.8 + 0.5 * firePulse));
fireGrad.addColorStop(0, '#ffffff');
fireGrad.addColorStop(0.2, '#ffaa00');
fireGrad.addColorStop(0.5, '#ff3300');
fireGrad.addColorStop(1, 'rgba(255,0,0,0)');
ctx.fillStyle = fireGrad;
ctx.beginPath();
ctx.moveTo(-w * 0.25, h * 0.8);
ctx.lineTo(0, h * (0.8 + 0.4 * firePulse * (0.8 + Math.random() * 0.4)));
ctx.lineTo(w * 0.25, h * 0.8);
ctx.closePath();
ctx.fill();
}

// 2. SIDE FIN WINGS
ctx.fillStyle = "#00a2ff";
ctx.shadowBlur = 10;
ctx.shadowColor = "#00a2ff";
ctx.beginPath(); ctx.moveTo(-w * 0.3, h * 0.4); ctx.lineTo(-w * 0.8, h * 0.8); ctx.lineTo(-w * 0.3, h * 0.75); ctx.fill();
ctx.beginPath(); ctx.moveTo(w * 0.3, h * 0.4); ctx.lineTo(w * 0.8, h * 0.8); ctx.lineTo(w * 0.3, h * 0.75); ctx.fill();

// 3. MAIN SOLID METALLIC FUSELAGE
let bodyGrad = ctx.createLinearGradient(-w * 0.5, 0, w * 0.5, 0);
bodyGrad.addColorStop(0, '#d1f4ff');
bodyGrad.addColorStop(0.3, '#ffffff');
bodyGrad.addColorStop(0.7, '#00f5ff');
bodyGrad.addColorStop(1, '#008bb3');
ctx.fillStyle = bodyGrad;
ctx.shadowColor = "#00f5ff";
ctx.shadowBlur = 15;

ctx.beginPath();
ctx.moveTo(0, 0);
ctx.bezierCurveTo(w * 0.5, h * 0.2, w * 0.5, h * 0.6, w * 0.3, h * 0.8);
ctx.lineTo(-w * 0.3, h * 0.8);
ctx.bezierCurveTo(-w * 0.5, h * 0.6, -w * 0.5, h * 0.2, 0, 0);
ctx.closePath();
ctx.fill();

// 4. COCKPIT VISOR
ctx.shadowBlur = 0;
ctx.fillStyle = "#03030c";
ctx.beginPath(); ctx.arc(0, h * 0.35, w * 0.2, 0, Math.PI * 2); ctx.fill();
ctx.fillStyle = "#ff00ff";
ctx.beginPath(); ctx.arc(0, h * 0.35, w * 0.14, 0, Math.PI * 2); ctx.fill();

ctx.restore();
}

function draw() {
ctx.fillStyle = "#03030c";
ctx.fillRect(0, 0, canvas.width, canvas.height);
drawGrid();

// Star updates
ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
stars.forEach(s => {
ctx.fillRect(s.x, s.y, s.size, s.size);
if (!isPaused) {
s.y += s.v * (warpTimer > 0 ? 5 : 1);
if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
}
});

// Render Rocket
drawRocket(player.x, player.y, player.w, player.h);

// Render Obstacles
obstacles.forEach((o, i) => {
if (!isPaused) o.y += o.speed * (warpTimer > 0 ? 0.4 : 1);
ctx.shadowBlur = 10;
ctx.shadowColor = `hsl(${o.hue}, 100%, 50%)`;
ctx.fillStyle = `hsl(${o.hue}, 100%, 45%)`;
ctx.fillRect(o.x, o.y, o.w, o.h);

// Collision logic
if (player.x + player.w * 0.5 > o.x && player.x - player.w * 0.5 < o.x + o.w &&
player.y + player.h > o.y && player.y < o.y + o.h) {
if (warpTimer === 0) endGame();
}
if (o.y > canvas.height) obstacles.splice(i, 1);
});

// Render Crystals
crystals.forEach((c, i) => {
if (!isPaused) c.y += c.speed;
ctx.shadowBlur = 15;
ctx.shadowColor = "#ff00ff";
ctx.fillStyle = "rgba(255, 0, 255, 0.3)";
ctx.beginPath(); ctx.arc(c.x, c.y, c.size + 5, 0, Math.PI * 2); ctx.fill();
ctx.fillStyle = "#ffffff";
ctx.beginPath(); ctx.arc(c.x, c.y, c.size, 0, Math.PI * 2); ctx.fill();

let dist = Math.hypot(player.x - c.x, (player.y + player.h/2) - c.y);
if (dist < (player.w * 0.7) + c.size) {
crystals.splice(i, 1);
warpTimer = 200;
}
if (c.y > canvas.height) crystals.splice(i, 1);
});

ctx.shadowBlur = 0;
requestAnimationFrame(() => {
update();
draw();
});
}

function endGame() {
gameRunning = false;
stopSpawning();
document.getElementById("pauseBtn").style.display = "none";
document.getElementById("finalScore").innerText = "FINAL SCORE: " + score;
document.getElementById("gameOver").classList.add("visible");
}

function restartGame() {
location.reload();
}

window.addEventListener("resize", () => {
resizeCanvas();
player.y = canvas.height - 150;
});

// Init Game Spawners
startSpawning();
draw();
</script>
</body>
</html>
